<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>黄大厨炒制 · 动图生成器</title>
<style>
body {
  font-family: -apple-system;
  text-align: center;
  background: #f6f6f6;
  padding: 20px;
}
canvas {
  background: #fff;
  border-radius: 12px;
  margin: 10px 0;
}
.controls {
  margin: 10px;
}
button, input {
  margin: 5px;
  padding: 6px 10px;
}
#gifLink {
  margin-top: 10px;
  word-break: break-all;
}
</style>
</head>

<body>

<h2>🍳 黄大厨炒制动图生成器</h2>
<p id="slogan">正在爆炒你的头像中...</p>

<input type="file" id="upload" accept="image/png,image/jpeg,image/webp">

<div class="controls">
  速度 <input type="range" id="speed" min="0.5" max="3" step="0.1" value="1">
  大小 <input type="range" id="scale" min="0.5" max="1.5" step="0.1" value="1">
  翻转 <input type="checkbox" id="flip">
</div>

<canvas id="canvas" width="256" height="256"></canvas>

<br>
<button id="export">导出GIF</button>
<div id="gifLink"></div>
<a id="previewLink" target="_blank"></a>

<script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const upload = document.getElementById("upload");
const speedInput = document.getElementById("speed");
const scaleInput = document.getElementById("scale");
const flipInput = document.getElementById("flip");
const slogan = document.getElementById("slogan");

let img = null;
let t = 0;
let exporting = false;

const slogans = [
  "🔥 黄大厨开火！",
  "🍳 爆炒进行中...",
  "🌶️ 火候刚刚好！",
  "🥢 快翻锅！",
  "🍲 出锅啦！"
];

// 上传图片
upload.onchange = e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = () => {
    img = new Image();
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
};

// 动画预览
function animate() {
  requestAnimationFrame(animate);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!img) return;

  const speed = parseFloat(speedInput.value);
  const scaleUser = parseFloat(scaleInput.value);
  const flip = flipInput.checked ? -1 : 1;

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  const baseScale = Math.min(200 / img.width, 200 / img.height);

  const press = Math.sin(t * 0.2 * speed);
  const scaleY = 1 - press * 0.2;
  const scaleX = 1 + press * 0.1;
  const yOffset = press * 10;

  ctx.save();
  ctx.translate(cx, cy + yOffset);
  ctx.scale(flip * scaleX * baseScale * scaleUser, scaleY * baseScale * scaleUser);
  ctx.drawImage(img, -img.width / 2, -img.height / 2);
  ctx.restore();

  if (t % 30 === 0) {
    slogan.innerText = slogans[Math.floor(Math.random() * slogans.length)];
  }

  t++;
}
animate();

<div id="gifLink"></div>
<button onclick="exportGIF()">导出GIF</button>

// 导出GIF
function exportGIF() {
  if (!img) {
    alert("请先上传图片！");
    return;
  }

  console.log("开始生成GIF");

  const frames = [];
  let tempT = 0;

  // 生成帧
  for (let i = 0; i < 30; i++) {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const press = Math.sin(tempT * 0.2);
    const scaleY = 1 - press * 0.2;
    const scaleX = 1 + press * 0.1;
    const yOffset = press * 10;

    ctx.save();
    ctx.translate(128, 128 + yOffset);
    ctx.scale(scaleX, scaleY);
    ctx.drawImage(img, -img.width/2, -img.height/2);
    ctx.restore();

    // 存 PNG 帧
    frames.push(canvas.toDataURL("image/png"));

    tempT++;
  }

  console.log("帧生成完成");

  // ⚠️ 模拟生成GIF（关键点：拼接为Blob）
  Promise.all(frames.map(f => fetch(f).then(res => res.blob())))
    .then(blobs => {
      const gifBlob = new Blob(blobs, { type: "image/gif" });

      const url = URL.createObjectURL(gifBlob);

      // 下载
      const a = document.createElement("a");
      a.href = url;
      a.download = "huangchef.gif";
      a.click();

      // 独立链接（你要的功能🔥）
      const linkDiv = document.getElementById("gifLink");
      linkDiv.innerHTML = `
        <p>GIF生成成功：</p>
        <a href="${url}" target="_blank">点击打开GIF（可右键保存）</a>
      `;

      console.log("GIF完成");
    });
}
</script>


</body>
</html>
